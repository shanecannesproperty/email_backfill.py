name: Email Backfill

on:
  # Runs every 30 minutes to sync newly arrived mail automatically.
  schedule:
    - cron: "*/30 * * * *"

  # Manual trigger — choose historical (full 12-month catch-up),
  # incremental (recent window), or custom (explicit date range).
  workflow_dispatch:
    inputs:
      run_mode:
        description: >
          Run mode:
          'historical' = auto-process last 12 months month by month;
          'incremental' = sync recent mail (last 2 days);
          'custom' = supply explicit start_date and end_date below.
        required: false
        default: "historical"
      start_date:
        description: "Start date (YYYY/MM/DD) — only used when run_mode is 'custom'"
        required: false
        default: ""
      end_date:
        description: "End date (YYYY/MM/DD) — only used when run_mode is 'custom'"
        required: false
        default: ""
      max_emails:
        description: "Max emails to process per chunk (default 2000)"
        required: false
        default: "2000"
      aidrive_folder:
        description: "AI Drive destination folder"
        required: false
        default: "04 - EMAIL ARCHIVE"

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the historical-mode checkpoint between runs so each
      # successive run advances further backwards instead of restarting
      # the same months. The runner filesystem is wiped at job end, so
      # without this cache `.backfill_checkpoint.json` would never survive.
      # The rolling key (run_id) plus restore-keys means every run saves a
      # new cache entry while restoring the most recent prior one.
      - name: Restore backfill checkpoint
        id: checkpoint-cache
        uses: actions/cache@v4
        with:
          path: .backfill_checkpoint.json
          key: backfill-checkpoint-${{ github.run_id }}
          restore-keys: |
            backfill-checkpoint-

      - name: Run email backfill
        env:
          # Preferred: Firebase auto-refresh credentials. When both are set
          # the uploader mints fresh AI Drive JWTs on demand and never
          # stops mid-run for a manually-pasted token.
          AIDRIVE_REFRESH_TOKEN: ${{ secrets.AIDRIVE_REFRESH_TOKEN }}
          AIDRIVE_FIREBASE_API_KEY: ${{ secrets.AIDRIVE_FIREBASE_API_KEY }}
          # Fallback: short-lived bearer JWT. Only used when the two
          # secrets above are not configured.
          AIDRIVE_TOKEN: ${{ secrets.AIDRIVE_TOKEN }}
          AIDRIVE_FOLDER: ${{ github.event.inputs.aidrive_folder || '04 - EMAIL ARCHIVE' }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          # Scheduled runs always use incremental mode.
          # Manual runs use the chosen run_mode (default: historical).
          RUN_MODE: ${{ github.event_name == 'schedule' && 'incremental' || github.event.inputs.run_mode || 'historical' }}
          START_DATE: ${{ github.event.inputs.start_date || '' }}
          END_DATE: ${{ github.event.inputs.end_date || '' }}
          MAX_EMAILS: ${{ github.event.inputs.max_emails || '2000' }}
        run: python email_backfill.py
