name: Email Backfill

on:
  # Runs every 5 minutes to sync newly arrived mail near real-time.
  schedule:
    - cron: "*/5 * * * *"

  # Manual trigger — choose historical (full 24-month catch-up),
  # incremental (recent window), or custom (explicit date range).
  workflow_dispatch:
    inputs:
      run_mode:
        description: >
          Run mode:
          'historical' = auto-process last 24 months month by month;
          'incremental' = sync recent mail (last 2 days);
          'custom' = supply explicit start_date and end_date below.
        required: false
        default: "historical"
      start_date:
        description: "Start date (YYYY/MM/DD) — only used when run_mode is 'custom'"
        required: false
        default: ""
      end_date:
        description: "End date (YYYY/MM/DD) — only used when run_mode is 'custom'"
        required: false
        default: ""
      max_emails:
        description: "Max emails to process per chunk (default 2000)"
        required: false
        default: "2000"
      aidrive_folder:
        description: "AI Drive destination folder"
        required: false
        default: "04 - EMAIL ARCHIVE"
      clear_checkpoint:
        description: "Set to 'true' to clear the checkpoint and re-process all months from scratch (failed emails only — already-uploaded emails are skipped via Gmail label)"
        required: false
        default: "false"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5 h — generous, prevents silent 6-h kill
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - account: primary
            gmail_refresh_secret: GMAIL_REFRESH_TOKEN
            checkpoint_key: backfill-checkpoint-primary
            checkpoint_file: .backfill_checkpoint.json
          - account: matters
            gmail_refresh_secret: GMAIL_REFRESH_TOKEN_MATTERS
            checkpoint_key: backfill-checkpoint-matters
            checkpoint_file: .backfill_checkpoint_matters.json

    # Separate concurrency groups per account so both can run in parallel
    # but two runs of the same account cannot overlap.
    concurrency:
      group: email-backfill-${{ matrix.account }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the historical-mode checkpoint between runs so each
      # successive run advances further backwards instead of restarting
      # the same months. Each account has its own checkpoint cache.
      - name: Restore backfill checkpoint
        id: checkpoint-cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.checkpoint_file }}
          key: ${{ matrix.checkpoint_key }}-${{ github.run_id }}-${{ strategy.job-index }}
          restore-keys: |
            ${{ matrix.checkpoint_key }}-
          save-always: true

      - name: Clear checkpoint (if requested)
        if: ${{ github.event.inputs.clear_checkpoint == 'true' }}
        run: |
          echo '{"version":1,"completed_chunks":[],"saved_at":"cleared"}' > ${{ matrix.checkpoint_file }}
          echo "Checkpoint cleared for ${{ matrix.account }} — historical run will re-process all months"

      - name: Run email backfill (${{ matrix.account }})
        env:
          AIDRIVE_REFRESH_TOKEN: ${{ secrets.AIDRIVE_REFRESH_TOKEN }}
          AIDRIVE_FIREBASE_API_KEY: ${{ secrets.AIDRIVE_FIREBASE_API_KEY }}
          AIDRIVE_TOKEN: ${{ secrets.AIDRIVE_TOKEN }}
          AIDRIVE_FOLDER: ${{ github.event.inputs.aidrive_folder || '04 - EMAIL ARCHIVE' }}
          GMAIL_CLIENT_ID: ${{ matrix.account == 'primary' && secrets.GMAIL_CLIENT_ID || secrets.GMAIL_CLIENT_ID_MATTERS }}
          GMAIL_CLIENT_SECRET: ${{ matrix.account == 'primary' && secrets.GOOGLE_OAUTH_CLIENT_SECRET || secrets.GOOGLE_OAUTH_CLIENT_SECRET_MATTERS }}
          GMAIL_REFRESH_TOKEN: ${{ matrix.account == 'primary' && secrets.GMAIL_REFRESH_TOKEN || secrets.GMAIL_REFRESH_TOKEN_MATTERS }}
          RUN_MODE: ${{ github.event_name == 'schedule' && 'incremental' || github.event.inputs.run_mode || 'historical' }}
          START_DATE: ${{ github.event.inputs.start_date || '' }}
          END_DATE: ${{ github.event.inputs.end_date || '' }}
          MAX_EMAILS: ${{ github.event.inputs.max_emails || '2000' }}
          CHECKPOINT_FILE: ${{ matrix.checkpoint_file }}
        run: python email_backfill.py
