# Place this file at: .github/workflows/backfill.yml in your repo.
#
# Trigger it manually from the Actions tab in GitHub, providing a date range.
# Each run processes one date range; rerun with different ranges for the
# full 12 months.

name: Email Backfill to AI Drive

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY/MM/DD)'
        required: true
        default: '2025/05/14'
      end_date:
        description: 'End date (YYYY/MM/DD)'
        required: true
        default: '2025/06/14'
      max_emails:
        description: 'Max emails this run'
        required: false
        default: '5000'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # near GitHub Actions 6hr cap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill
        env:
          AIDRIVE_API_KEY: ${{ secrets.AIDRIVE_API_KEY }}
          AIDRIVE_FOLDER: '04 - EMAIL ARCHIVE'
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          MAX_EMAILS: ${{ inputs.max_emails }}
        run: python email_backfill.py
